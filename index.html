<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joice's Fits Moodboard</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: auto; 
      background-color: #050505; 
      overflow-x: hidden; 
    }

    /* Background Kotak-Kotak Full Screen */
    .y2k-container {
      position: relative;
      width: 100%;   
      min-height: 100vh;  
      background-color: #fdfdfd; 
      background-image: linear-gradient(to bottom, transparent 80%, #ff69b4 100%);
    }

    /* Efek Grid Biru */
    .y2k-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(to right, #bde0fe 1px, transparent 1px), 
        linear-gradient(to bottom, #bde0fe 1px, transparent 1px); 
      background-size: 15px 15px;
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
      pointer-events: none;
    }

    /* PAPAN VIRTUAL STIKER */
    .moodboard-canvas {
      position: relative;
      width: 100%;
      max-width: 100%;
      aspect-ratio: 16 / 9; 
      margin: 0 auto;
    }

    /* SECTION BARU 2: AREA PINK GRADASI (Tempat Pinterest) */
    .section-pink {
      position: relative;
      width: 100%;
      min-height: 95vh; 
      background: linear-gradient(to bottom, #ff69b4 0%, #ff1493 40%, #d5006d 70%, #050505 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: 'Courier New', Courier, monospace;
      padding: 40px 20px;
    }

    /* SECTION BARU 3: AREA HITAM (Paling Bawah) */
    .section-black {
      position: relative;
      width: 100%;
      min-height: 80vh;
      background-color: #050505;
      padding-bottom: 40px;
    }

    .section-black::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(to right, #2a2a2a 1px, transparent 1px), 
        linear-gradient(to bottom, #2a2a2a 1px, transparent 1px);
      background-size: 15px 15px;
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%);
      pointer-events: none;
    }

    /* FOOTER KONTAK */
    .footer-contact {
      position: relative;
      text-align: center;
      padding: 60px 20px 20px 20px;
      font-family: 'Courier New', Courier, monospace;
      z-index: 10;
    }

    /* STYLE LOADING & ANIMASI POP STIKER */
    .loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #fdfdfd; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .spinner {
      width: 45px; height: 45px; border: 5px solid #e3e3e3;
      border-top: 5px solid #bde0fe; border-radius: 50%;
      animation: putar 1s linear infinite; margin-bottom: 12px;
    }
    @keyframes putar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      font-family: 'Courier New', Courier, monospace; color: #a2d2ff;
      font-size: 13px; font-weight: bold; letter-spacing: 2px;
    }

    @keyframes popUp {
      0% { opacity: 0; transform: scale(0.2) rotate(-15deg); }
      60% { opacity: 1; transform: scale(1.2) rotate(10deg); }
      80% { transform: scale(0.9) rotate(-5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .stiker {
      position: absolute; opacity: 0; cursor: pointer; transition: transform 0.2s; will-change: transform, opacity;
    }
    .stiker.mulai-pop {
      animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .stiker:hover {
      transform: scale(1.15) translateY(-5px) !important;
    }

    /* KOORDINAT PERSENTASE STIKER */
    .kerang   { width: 14%;  top: 8%;  left: 5%;  }
    .apel      { width: 15%;  top: 18%; left: 23%; } 
    .kucing   { width: 15%;  top: 10%; left: 44%; }
    .kopi      { width: 15%;  top: 18%; left: 63%; }
    .fragile  { width: 14%;  top: 12%; left: 80%; } 
    
    .anjing   { width: 18%;  top: 42%; left: 5%;  }
    .nota      { width: 18%;  top: 45%; left: 28%; } 
    .pisang   { width: 15%;  top: 48%; left: 54%; } 
    .kunci     { width: 18%;  top: 44%; left: 76%; } 
    
    .txt-mood { width: 42%;  top: 55%; left: 5%;  } 
    .txt-welc { width: 34%;  top: 58%; left: 58%; } 

    /* CONTAINER UTAMA BROWSER WINDOW */
.browser-window {
      width: 100%;
      max-width: 1050px; /* Ditambah biar kotak browsernya lebih besar & muat 3 folder lebar */
      background: #e1e1e2; 
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
      margin: 0 auto 30px auto;
      overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .browser-top-bar {
      display: flex;
      align-items: flex-end;
      padding: 10px 16px 0 16px;
      background: #e1e1e2;
      position: relative;
    }

    .mac-buttons {
      display: flex;
      gap: 6px;
      position: absolute;
      top: 14px;
      left: 16px;
    }
    .circle {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .close-btn { background: #ff5f56; }
    .minimize-btn { background: #ffbd2e; }
    .maximize-btn { background: #27c93f; }

    .tab-container {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      margin-left: 60px; 
      width: 100%;
    }

    .tab {
      position: relative;
      padding: 8px 28px;
      font-size: 13px;
      font-weight: bold;
      color: #666;
      cursor: pointer;
      background: transparent;
      user-select: none;
      border-radius: 8px 8px 0 0;
      transition: all 0.2s;
      display: flex;
      align-items: center;
    }

    .tab.active {
      color: #000;
      background: #f1f1f2; 
    }

    /* Tombol X khusus di tab dinamis */
    .tab-close-icon {
      color: #ff5f56;
      margin-left: 8px;
      font-size: 14px;
      line-height: 1;
      font-weight: 900;
    }
    .tab-close-icon:hover {
      color: #d03027;
    }

    /* AREA SEARCH BAR */
    .browser-search-bar-row {
      background: #f1f1f2; 
      padding: 8px 16px 12px 16px;
      border-bottom: 2px solid #dbdbdb;
      display: flex;
      flex-direction: column;
    }

    .search-box {
      width: 100%;
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      color: #333;
      outline: none;
    }

    .search-hint-text {
      font-size: 11px;
      color: #666;
      font-style: italic;
      margin-top: 6px;
      margin-left: 4px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .pinterest-scroll-box {
      background: #ffffff; 
      height: 520px; 
      overflow-y: scroll; 
      padding: 20px;
    }

    .outfit-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      transition: all 0.4s ease;
    }

    .outfit-card {
      width: 100%;
      aspect-ratio: 4 / 5; 
      background: #f5f5f5;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      position: relative;
      cursor: pointer;
      transition: filter 0.5s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }

.click-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;      /* Bikin ke tengah secara vertikal */
      justify-content: center;  /* Bikin ke tengah secara horizontal */
      text-align: center;       /* Ngerapiin teksnya biar gak mencong */
      color: white;
      font-size: 16px;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); box-shadow: 0 4px 10px rgba(255, 20, 147, 0.2); }
      50% { transform: scale(1.03); box-shadow: 0 12px 28px rgba(255, 20, 147, 0.6); }
      100% { transform: scale(1); box-shadow: 0 4px 10px rgba(255, 20, 147, 0.2); }
    }

    .outfit-card.focus-pulse {
      animation: heartbeat 1.4s infinite ease-in-out;
      border: 3px solid #ff1493;
    }
    .outfit-card.focus-pulse .click-overlay {
      opacity: 1;
    }
    .outfit-card.focus-blur {
      filter: blur(5px);
      opacity: 0.5;
    }
    .outfit-card img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
    }

/* ======================================================= */
    /* 📁 CSS FOLDER BY STYLE (UKURAN 100% ORIGINAL CETAKAN)   */
    /* ======================================================= */
    .style-folder-grid {
      display: flex;
      flex-wrap: wrap;
      width: 100%;
      gap: 3%; /* Jarak antar folder pakai persen biar responsif */
    }

    .folder-card {
      width: 31.33%; /* Dikunci maksimal 3 folder per baris */
      background: #ffffff; /* Background putih murni */
      border-radius: 6px;
      padding: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03); /* Bayangan super halus & estetik */
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 15px;
    }

    .folder-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1); /* Bayangan sedikit menebal pas di-hover */
    }

    .folder-card img {
      width: 100%;
      height: auto; /* Biar gambar proporsional, gak ketarik */
      object-fit: contain; /* Nampilin gambar utuh tanpa di-crop */
      border-radius: 4px;
    }

    .folder-title {
      margin-top: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      text-transform: capitalize;
    }
  </style>
</head>

  <script>
  // 1. Loader Screen Script (VERSI BARU: Ngebut & Pinter!)
    document.addEventListener("DOMContentLoaded", function() {
      const loader = document.getElementById('y2k-loader');
      if (!loader) return;

      // Kasih tahu satpam: "Cuma tunggu stiker sama gambar baju pertama aja ya!"
      const gambarWajib = Array.from(document.querySelectorAll('.stiker, #targetOutfit img'));
      let jumlahSiap = 0;

      function bukaLayarLoading() {
        jumlahSiap++;
        // Kalau gambar wajib udah beres di-download semua, langsung buka tirainya!
        if (jumlahSiap === gambarWajib.length) {
          loader.style.opacity = '0';
          loader.style.transform = 'scale(1.05)';
          setTimeout(function() {
            loader.style.display = 'none';
            // Panggil animasi pop-up stikernya
            document.querySelectorAll('.stiker').forEach(function(el) {
              el.classList.add('mulai-pop');
            });
          }, 500); 
        }
      }

      // Cek satu-satu apakah gambarnya udah siap
      if (gambarWajib.length === 0) {
        bukaLayarLoading(); // Jaga-jaga kalau error
      } else {
        gambarWajib.forEach(img => {
          if (img.complete) {
            bukaLayarLoading(); // Gambarnya udah ada di cache / cepet banget
          } else {
            img.addEventListener('load', bukaLayarLoading); // Nunggu gambar selesai
            img.addEventListener('error', bukaLayarLoading); // Kalau gambar error, tetep lanjut biar web nggak stuck loading selamanya
          }
        });
      }
    });
// 2. Animasi Pop-Up Stiker
    document.querySelectorAll('.stiker').forEach(function(button) {
      button.addEventListener('click', function() {
        document.querySelectorAll('.stiker').forEach(function(el) {
          el.classList.remove('mulai-pop');
          void el.offsetWidth; 
          el.classList.add('mulai-pop');
        });
      });
    });

    // 3. FUNGSI SAKTI: Navigasi Tab ALL & BY STYLE
    function gantiTab(elemen) {
      document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
      elemen.classList.add('active');

      const namaTab = elemen.innerText.trim();
      const gridBaju = document.getElementById('outfitGrid');
      const gridFolder = document.getElementById('styleFolderGrid');
      const inputSearch = document.querySelector('.search-box');

      // Kalau tab ALL atau BY STYLE diklik, hapus tab dinamis (kalau lagi terbuka)
      const tabDinamis = document.getElementById('dynamic-tab');
      if (tabDinamis) tabDinamis.remove();

      if (namaTab === 'ALL') {
        gridBaju.style.display = 'grid';
        gridFolder.style.display = 'none';
        document.querySelectorAll('.outfit-card').forEach(card => card.style.display = 'block');
        if(inputSearch) inputSearch.value = ''; // Kosongin search box
      } else if (namaTab === 'BY STYLE') {
        gridBaju.style.display = 'none';
        gridFolder.style.display = 'flex';
      }
    }

    // 4. FUNGSI SAKTI: Waktu Folder Gaya Diklik
    function pilihStyle(namaStyle) {
      // 1. Buka lemari baju, tutup lemari folder
      document.getElementById('styleFolderGrid').style.display = 'none';
      document.getElementById('outfitGrid').style.display = 'grid';
      
      // 2. Matikan status aktif tab ALL / BY STYLE
      document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));

      // 3. Hapus tab dinamis lama kalau ada
      const tabDinamisLama = document.getElementById('dynamic-tab');
      if (tabDinamisLama) tabDinamisLama.remove();

      // 4. BIKIN TAB DINAMIS BARU + TOMBOL X
      const tabBaru = document.createElement('div');
      tabBaru.className = 'tab active';
      tabBaru.id = 'dynamic-tab';
      
      // Di sinilah tombol X disematkan (hanya di tab ini!)
      tabBaru.innerHTML = `${namaStyle.toUpperCase()} <span class="tab-close-icon" onclick="tutupTabDinamis(event)">✖</span>`;
      
      // Kalau tab dinamisnya diklik (bukan X-nya), filter ulang
      tabBaru.onclick = function() {
        document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
        tabBaru.classList.add('active');
        document.getElementById('styleFolderGrid').style.display = 'none';
        document.getElementById('outfitGrid').style.display = 'grid';
        jalankanFilterGaya(namaStyle);
      };
      
      document.getElementById('tabs').appendChild(tabBaru);

      // 5. Jalankan Filternya
      jalankanFilterGaya(namaStyle);
    }

    // 5. FUNGSI SAKTI: Waktu Tombol X di Tab Dinamis Diklik
    function tutupTabDinamis(event) {
      event.stopPropagation(); // Biar tab dinamisnya nggak ikut keklik
      const tabAll = document.querySelector('#tabs .tab'); // Cari tab ALL
      gantiTab(tabAll); // Jalankan saklar ALL
    }

    // 6. FUNGSI SAKTI: Mesin Filter Baju
    function jalankanFilterGaya(kataKunci) {
      const cards = document.querySelectorAll('.outfit-card');
      cards.forEach(card => {
        const tags = card.getAttribute('data-tags') ? card.getAttribute('data-tags').toLowerCase() : '';
        if (tags.includes(kataKunci.toLowerCase())) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    }

    // 7. FUNGSI SAKTI: Search Box
    const searchInput = document.querySelector('.search-box');
    if(searchInput) {
      searchInput.addEventListener('input', function(e) {
        // Balikin ke tab ALL diam-diam tiap kali ngetik
        const tabAll = document.querySelector('#tabs .tab');
        if(!tabAll.classList.contains('active')) {
          gantiTab(tabAll); 
        }
        const kataKunci = e.target.value.toLowerCase().trim();
        jalankanFilterGaya(kataKunci);
      });
    }

    // 8. LOGIKA KUNCI FOKUS & SCROLL DETECTOR
    const targetSection = document.getElementById('pinterest-section');
    const targetCard = document.getElementById('targetOutfit');
    const allCards = document.querySelectorAll('.outfit-card');

    const observerOptions = {
      root: null,
      threshold: 0.4
    };

    const scrollObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          targetCard.classList.add('focus-pulse');
          allCards.forEach(card => {
            if (card !== targetCard) {
              card.classList.add('focus-blur');
            }
          });
        }
      });
    }, observerOptions);

    scrollObserver.observe(targetSection);

    targetCard.addEventListener('click', function() {
      targetCard.classList.remove('focus-pulse');
      allCards.forEach(card => card.classList.remove('focus-blur'));
    });
  </script>
</body>
</html>
