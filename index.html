<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joice's Fits Moodboard</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: auto; 
      background-color: #050505; 
      overflow-x: hidden; 
    }

    /* Background Kotak-Kotak Full Screen */
    .y2k-container {
      position: relative;
      width: 100%;   
      min-height: 100vh;  
      background-color: #fdfdfd; 
      background-image: linear-gradient(to bottom, transparent 80%, #ff69b4 100%);
    }

    /* Efek Grid Biru */
    .y2k-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(to right, #bde0fe 1px, transparent 1px), 
        linear-gradient(to bottom, #bde0fe 1px, transparent 1px); 
      background-size: 15px 15px;
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
      pointer-events: none;
    }

    /* PAPAN VIRTUAL STIKER */
    .moodboard-canvas {
      position: relative;
      width: 100%;
      max-width: 100%;
      aspect-ratio: 16 / 9; 
      margin: 0 auto;
    }

    /* ======================================================= */
    /* 💗 SECTION BARU 2: AREA PINK GRADASI (Tempat Pinterest) */
    /* ======================================================= */
    .section-pink {
      position: relative;
      width: 100%;
      min-height: 95vh; 
      background: linear-gradient(to bottom, #ff69b4 0%, #ff1493 40%, #d5006d 70%, #050505 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: 'Courier New', Courier, monospace;
      padding: 40px 20px;
    }

    /* ======================================================= */
    /* 🖤 SECTION BARU 3: AREA HITAM (Paling Bawah)           */
    /* ======================================================= */
    .section-black {
      position: relative;
      width: 100%;
      min-height: 80vh;
      background-color: #050505;
      padding-bottom: 40px;
    }

    .section-black::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(to right, #2a2a2a 1px, transparent 1px), 
        linear-gradient(to bottom, #2a2a2a 1px, transparent 1px);
      background-size: 15px 15px;
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%);
      pointer-events: none;
    }

    /* FOOTER KONTAK */
    .footer-contact {
      position: relative;
      text-align: center;
      padding: 60px 20px 20px 20px;
      font-family: 'Courier New', Courier, monospace;
      z-index: 10;
    }

    /* STYLE LOADING & ANIMASI POP STIKER */
    .loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #fdfdfd; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .spinner {
      width: 45px; height: 45px; border: 5px solid #e3e3e3;
      border-top: 5px solid #bde0fe; border-radius: 50%;
      animation: putar 1s linear infinite; margin-bottom: 12px;
    }
    @keyframes putar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      font-family: 'Courier New', Courier, monospace; color: #a2d2ff;
      font-size: 13px; font-weight: bold; letter-spacing: 2px;
    }

    @keyframes popUp {
      0% { opacity: 0; transform: scale(0.2) rotate(-15deg); }
      60% { opacity: 1; transform: scale(1.2) rotate(10deg); }
      80% { transform: scale(0.9) rotate(-5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .stiker {
      position: absolute; opacity: 0; cursor: pointer; transition: transform 0.2s; will-change: transform, opacity;
    }
    .stiker.mulai-pop {
      animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .stiker:hover {
      transform: scale(1.15) translateY(-5px) !important;
    }

    /* 📐 KOORDINAT PERSENTASE STIKER */
    .kerang   { width: 14%;  top: 8%;  left: 5%;  }
    .apel      { width: 15%;  top: 18%; left: 23%; } 
    .kucing   { width: 15%;  top: 10%; left: 44%; }
    .kopi      { width: 15%;  top: 18%; left: 63%; }
    .fragile  { width: 14%;  top: 12%; left: 80%; } 
    
    .anjing   { width: 18%;  top: 42%; left: 5%;  }
    .nota      { width: 18%;  top: 45%; left: 28%; } 
    .pisang   { width: 15%;  top: 48%; left: 54%; } 
    .kunci     { width: 18%;  top: 44%; left: 76%; } 
    
    .txt-mood { width: 42%;  top: 55%; left: 5%;  } 
    .txt-welc { width: 34%;  top: 58%; left: 58%; } 

    /* CONTAINER UTAMA BROWSER WINDOW */
    .browser-window {
      width: 100%;
      max-width: 950px;
      background: #e1e1e2; 
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
      margin: 0 auto 30px auto;
      overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .browser-top-bar {
      display: flex;
      align-items: flex-end;
      padding: 10px 16px 0 16px;
      background: #e1e1e2;
      position: relative;
    }

    .mac-buttons {
      display: flex;
      gap: 6px;
      position: absolute;
      top: 14px;
      left: 16px;
    }
    .circle {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .close-btn { background: #ff5f56; }
    .minimize-btn { background: #ffbd2e; }
    .maximize-btn { background: #27c93f; }

    .tab-container {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      margin-left: 60px; 
      width: 100%;
    }

    .tab {
      position: relative;
      padding: 8px 28px;
      font-size: 13px;
      font-weight: bold;
      color: #666;
      cursor: pointer;
      background: transparent;
      user-select: none;
      border-radius: 8px 8px 0 0;
      transition: all 0.2s;
    }

    .tab.active {
      color: #000;
      background: #f1f1f2; 
    }

    /* AREA SEARCH BAR + TEXT HINT REQUEST KAMU */
    .browser-search-bar-row {
      background: #f1f1f2; 
      padding: 8px 16px 12px 16px;
      border-bottom: 2px solid #dbdbdb;
      display: flex;
      flex-direction: column;
    }

    .search-box {
      width: 100%;
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      color: #333;
      outline: none;
    }

    /* Kalimat Petunjuk Tambahan Tepat di Bawah Search Box */
    .search-hint-text {
      font-size: 11px;
      color: #666;
      font-style: italic;
      margin-top: 6px;
      margin-left: 4px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .pinterest-scroll-box {
      background: #ffffff; 
      height: 520px; 
      overflow-y: scroll; 
      padding: 20px;
    }

    .outfit-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      transition: all 0.4s ease;
    }

    /* 📦 ANIMASI KEDUT & BLUR MANAGEMENT (REQUEST SPESTAL) */
    .outfit-card {
      width: 100%;
      aspect-ratio: 4 / 5; 
      background: #f5f5f5;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      position: relative;
      cursor: pointer;
      transition: filter 0.5s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }

    /* Kerangka Teks Overlay "Click to open" */
    .click-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none; /* Biar gak ngeblok klik mouse */
    }

    /* Jalankan Animasi Denyut Nadi / Kedut */
    @keyframes heartbeat {
      0% { transform: scale(1); box-shadow: 0 4px 10px rgba(255, 20, 147, 0.2); }
      50% { transform: scale(1.03); box-shadow: 0 12px 28px rgba(255, 20, 147, 0.6); }
      100% { transform: scale(1); box-shadow: 0 4px 10px rgba(255, 20, 147, 0.2); }
    }

    /* Ketika terpicu scroll, outfit-card pertama dapet kelas ini */
    .outfit-card.focus-pulse {
      animation: heartbeat 1.4s infinite ease-in-out;
      border: 3px solid #ff1493;
    }
    /* Memunculkan tulisan "Click to open?" */
    .outfit-card.focus-pulse .click-overlay {
      opacity: 1;
    }

    /* Kartu lain yang dapet kelas blur bakal buram otomatis */
    .outfit-card.focus-blur {
      filter: blur(5px);
      opacity: 0.5;
    }

    .outfit-card img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
    }
  </style>
</head>
<body>

  <div class="y2k-container">
    <div class="loading-screen" id="y2k-loader">
      <div class="spinner"></div>
      <div class="loading-text">HOLD ON, BESTIE...</div>
    </div>

    <div class="moodboard-canvas">
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-2.png" class="stiker kerang" alt="Kerang" loading="eager" fetchpriority="high">
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-3.png" class="stiker apel" alt="Apel" loading="eager" fetchpriority="high">
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-4.png" class="stiker kucing" alt="Kucing" loading="eager" fetchpriority="high">
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-5.png" class="stiker kopi" alt="Kopi" loading="eager" fetchpriority="high">
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-6.png" class="stiker fragile" alt="Fragile" loading="eager" fetchpriority="high">
      
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-7.png" class="stiker anjing" alt="Anjing" loading="eager" fetchpriority="high">
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-10-1.png" class="stiker nota" alt="Nota Kunci" loading="eager" fetchpriority="high">
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-9.png" class="stiker pisang" alt="Pisang" loading="eager" fetchpriority="high">
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-11.png" class="stiker kunci" alt="Kunci" loading="eager" fetchpriority="high">
      
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-12.png" class="stiker txt-mood" alt="Moodboard Text" loading="eager" fetchpriority="high">
      <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/brain-dump-website-in-white-neon-pink-black-style-13.png" class="stiker txt-welc" alt="Welcome Text" loading="eager" fetchpriority="high">
    </div>
  </div>

  <div class="section-pink" id="pinterest-section">
    
    <div class="browser-window">
      
      <div class="browser-top-bar">
        <div class="mac-buttons">
          <div class="circle close-btn"></div>
          <div class="circle minimize-btn"></div>
          <div class="circle maximize-btn"></div>
        </div>
        <div class="tab-container" id="tabs">
          <div class="tab active" onclick="gantiTab(this)">ALL</div>
          <div class="tab" onclick="gantiTab(this)">BY STYLE</div>
        </div>
      </div>

      <div class="browser-search-bar-row">
        <input type="text" class="search-box" placeholder="🔍 Search outfit...">
        <span class="search-hint-text">Klik outfit untuk melihat detail baju dan dimana membelinya ✨</span>
      </div>

      <div class="pinterest-scroll-box">
        <div class="outfit-grid" id="outfitGrid">
          
          <div class="outfit-card" id="targetOutfit">
            <img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/1_20260624_112159_00005215354693695756945.png" alt="Outfit Utama">
            <div class="click-overlay">CLICK TO OPEN?</div>
          </div>

          <div class="outfit-card"><img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/1_20260624_112159_00005215354693695756945.png" alt="Outfit 2"></div>
          <div class="outfit-card"><img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/1_20260624_112159_00005215354693695756945.png" alt="Outfit 3"></div>
          <div class="outfit-card"><img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/1_20260624_112159_00005215354693695756945.png" alt="Outfit 4"></div>
          <div class="outfit-card"><img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/1_20260624_112159_00005215354693695756945.png" alt="Outfit 5"></div>
          <div class="outfit-card"><img src="https://joicesfits.wordpress.com/wp-content/uploads/2026/06/1_20260624_112159_00005215354693695756945.png" alt="Outfit 6"></div>
          
        </div>
      </div>

    </div>

  </div>

  <div class="section-black">
    <div class="footer-contact">
      <h3 style="margin: 0 0 15px 0; letter-spacing: 3px; color: white; font-size: 24px;">CONTACT ME</h3>
      <p style="color: #ffb6c1; font-weight: bold; font-size: 15px; margin: 0;">
        ✉️ contact@joicesfits.com &nbsp;&nbsp;|&nbsp;&nbsp; 📸 @joicesfits
      </p>
    </div>
  </div>

  <script>
    // 1. Loader Screen Script
    window.addEventListener('load', function() {
      const loader = document.getElementById('y2k-loader');
      if (loader) {
        loader.style.opacity = '0';
        loader.style.transform = 'scale(1.05)';
        setTimeout(function() {
          loader.style.display = 'none';
          document.querySelectorAll('.stiker').forEach(function(el) {
            el.classList.add('mulai-pop');
          });
        }, 500); 
      }
    });

    // 2. Animasi Pop-Up Stiker Saat Diklik
    document.querySelectorAll('.stiker').forEach(function(button) {
      button.addEventListener('click', function() {
        document.querySelectorAll('.stiker').forEach(function(el) {
          el.classList.remove('mulai-pop');
          void el.offsetWidth; 
          el.classList.add('mulai-pop');
        });
      });
    });

    // 3. Fungsi Navigasi Tab
    function gantiTab(elemen) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      elemen.classList.add('active');
    }

    // 4. SCRIPT LOGIKA KUNCI FOKUS & SCROLL DETECTOR (REQUEST SPECIAL!)
    const targetSection = document.getElementById('pinterest-section');
    const targetCard = document.getElementById('targetOutfit');
    const allCards = document.querySelectorAll('.outfit-card');

    const observerOptions = {
      root: null,
      threshold: 0.4 // Memicu efek ketika 40% area pinterest sudah muncul di layar
    };

    const scrollObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          // AKTIFKAN SIHIR: Target kedut-kedut, yang lain kena kutuk blur!
          targetCard.classList.add('focus-pulse');
          allCards.forEach(card => {
            if (card !== targetCard) {
              card.classList.add('focus-blur');
            }
          });
        }
      });
    }, observerOptions);

    // Mulai mengawasi pergerakan scroll menuju section pinterest
    scrollObserver.observe(targetSection);

    // Menghilangkan efek blur & kedut saat kartu utama sukses diklik user
    targetCard.addEventListener('click', function() {
      targetCard.classList.remove('focus-pulse');
      allCards.forEach(card => card.classList.remove('focus-blur'));
    });
  </script>
</body>
</html>
